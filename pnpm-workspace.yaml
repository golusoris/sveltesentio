# esbuild/sharp/onnxruntime/protobufjs ship prebuilt binaries; their build
# scripts are not needed to lint/typecheck/test/build the src/-only packages.
# pnpm 11.7 only reads this from pnpm-workspace.yaml (not .npmrc / env), and it
# governs every command (install + the pnpm-script deps preflight), so CI stays green.
strictDepBuilds: false
packages:
  - 'packages/*'
  - 'apps/*'
# Storybook 10.4.5 is recent; exclude its (dev-only, never-shipped) packages from
# pnpm's minimumReleaseAge cooldown so the showcase app installs.
minimumReleaseAgeExclude:
  - '@storybook/addon-a11y@10.4.5'
  - '@storybook/builder-vite@10.4.5'
  - '@storybook/csf-plugin@10.4.5'
  - '@storybook/svelte-vite@10.4.5'
  - '@storybook/svelte@10.4.5'
  - storybook@10.4.5
onlyBuiltDependencies:
  - esbuild
  - onnxruntime-node
  - protobufjs
  - sharp
# Force-bump vulnerable transitive dev/build deps to their patched releases so
# `pnpm audit` is clean (§2.5). All reach the tree only via build/dev tooling
# (vite→esbuild, @vite-pwa→workbox→serialize-javascript, storybook/vite→undici)
# or consumer-provided peers (@sveltejs/kit→cookie); none ship in the src/-only
# package tarballs.
overrides:
  serialize-javascript: '>=7.0.5'
  esbuild: '>=0.28.1'
  cookie: '>=0.7.0'
  undici: '>=7.28.0 <8' # 8.x removes internals jsdom 29 requires; stay on patched 7.x
