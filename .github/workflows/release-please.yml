name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create releases + tags, upload attestations
      pull-requests: write # open/update the "chore: release main" PR
      id-token: write # OIDC for npm provenance + Sigstore attestation
      attestations: write # actions/attest-build-provenance
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # --- Publish to npm — runs ONLY when release-please cut a release. ---
      # Gated on the SAME-JOB step output (the official release-please-action
      # pattern). The previous setup gated a separate reusable-workflow job on
      # `needs.release-please.outputs.releases_created`; that never fired (the
      # publish job was `skipped` even on release run #96, which DID create the
      # tags), so every package was published by hand. Inlining + same-job gate
      # removes the cross-job fragility. The command is also now recursive
      # (`pnpm -r publish`); the old `pnpm publish` ran at the private root and
      # would have published nothing even had the gate fired.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # (ignored-build-scripts are tolerated via pnpm-workspace.yaml
      # `strictDepBuilds: false` — esbuild/sharp/etc. aren't needed to pack src/.)
      - if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: corepack enable && pnpm install --frozen-lockfile

      # Packages ship files:["src"] with exports → ./src/*.ts, so there is no
      # build step before publish (the tsc `build` output is never shipped).
      - name: Publish packages to npm
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true' # best-effort npm-native provenance badge

      # SLSA provenance over the artifacts that are ACTUALLY published (src/),
      # not the unshipped tsc dist/ the previous workflow mistakenly attested.
      - name: Attest build provenance
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'packages/*/src/**'

      # CycloneDX SBOM for the release (§2.5). continue-on-error: SBOM generation
      # must never fail an already-completed publish; the artifact is best-effort.
      - name: Generate SBOM (CycloneDX)
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        continue-on-error: true
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json
