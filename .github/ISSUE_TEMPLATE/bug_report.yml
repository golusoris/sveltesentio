name: Bug Report
description: Report a bug in sveltesentio
labels: ['bug', 'triage']
assignees: ['lusoris']
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check [existing issues](https://github.com/golusoris/sveltesentio/issues).
  - type: input
    id: package
    attributes:
      label: Package
      placeholder: '@sveltesentio/core'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: '0.1.0'
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Code or link to a minimal reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Node: 22.x
        - pnpm: 10.x
        - SvelteKit: 2.x
        - Browser (if applicable):
